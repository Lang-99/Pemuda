<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✦ Ardi & Tiga Sahabat ✦ | Perjalanan Rasa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0c1f 0%, #1a152f 50%, #0d0b1a 100%);
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-ornament {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 20% 40%, rgba(255,180,200,0.08) 0%, transparent 50%);
        }

        /* Main Container */
        .story-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Glass Card */
        .story-card {
            background: rgba(25, 20, 40, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            overflow: hidden;
            border: 1px solid rgba(255, 200, 210, 0.25);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
        }

        /* Character Bar */
        .character-bar {
            background: linear-gradient(135deg, rgba(255, 140, 170, 0.3), rgba(180, 120, 200, 0.2));
            padding: 20px 20px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 200, 220, 0.2);
        }

        .char-tag {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #ccb5dd;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .char-tag.active {
            background: #ff99bb;
            color: #1a0f2a;
            box-shadow: 0 0 12px rgba(255, 150, 200, 0.5);
        }

        /* Main Story Area */
        .story-area {
            padding: 32px 24px;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .story-text {
            background: rgba(10, 8, 22, 0.75);
            backdrop-filter: blur(12px);
            padding: 28px 22px;
            border-radius: 36px;
            color: #f3eaff;
            line-height: 1.75;
            font-size: 0.98rem;
            font-weight: 500;
            text-align: left;
            border: 1px solid rgba(255, 180, 200, 0.4);
            transition: all 0.3s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .story-text .quote {
            display: block;
            font-size: 1.8rem;
            text-align: center;
            color: #ffb7c5;
            margin-bottom: 8px;
        }

        /* Progress */
        .progress-section {
            padding: 8px 24px 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #bbaacc;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 5px;
            background: rgba(80, 60, 110, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff99bb, #ffcc88);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* Next Button */
        .next-section {
            padding: 8px 24px 28px;
        }

        .next-btn {
            width: 100%;
            background: linear-gradient(105deg, #ff85a1, #ff6b8b);
            border: none;
            padding: 18px 20px;
            border-radius: 80px;
            color: #1e102f;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .next-btn:active {
            transform: scale(0.97);
        }

        /* Footer */
        .info-footer {
            display: flex;
            justify-content: space-between;
            padding: 12px 24px 24px;
            font-size: 0.65rem;
            color: #9988aa;
        }

        .reset-link {
            background: none;
            border: none;
            color: #ffbbdd;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.65rem;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.5s ease forwards;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.6rem;
            color: #665588;
        }
    </style>
</head>
<body>
<div class="bg-ornament"></div>

<div class="story-container">
    <div class="story-card">
        
        <div class="character-bar" id="charBar">
            <div class="char-tag" data-char="ardi">🌸 Ardi</div>
            <div class="char-tag" data-char="kenan">🍔 Kenan</div>
            <div class="char-tag" data-char="langit">🌙 Langit</div>
            <div class="char-tag" data-char="hanif">✏️ Hanif</div>
        </div>

        <div class="story-area">
            <div class="story-text" id="storyText">
                <span class="quote">“</span>
                Memuat cerita...
                <span class="quote">”</span>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span>Perjalanan Batin</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="next-section">
            <button class="next-btn" id="nextBtn">➡ LANJUTKAN CERITA ⬅</button>
        </div>

        <div class="info-footer">
            <span>✨ Kisah Linear - Klik Next ✨</span>
            <button class="reset-link" id="resetBtn">🔄 Mulai Awal</button>
        </div>
    </div>
    <footer>💭 Terkadang jatuh cinta bukan tentang memiliki, tapi tentang tumbuh</footer>
</div>

<script>
    // ======================== CERITA (REVISED) ========================
    const chapters = [
        {
            text: "🌤️ Siang itu di kantin sekolah, Ardi duduk sendiri. Kenan yang gendut duduk di depannya sambil mengunyah ayam goreng.\n\n\"Lu makan dikit, Di. Ntar lemes.\" ucap Kenan sambil menyodorkan pisang goreng.\n\nArdi tersenyum. Kenan selalu blak-blakan, gak pernah manis-manisan. Tapi justru itu yang bikin Ardi nyaman.\n\nLangit datang dengan rambut pendeknya yang rapi, duduk di samping Kenan. \"Lo berdua kayak saudara aja.\" katanya datar.\n\nHanif yang gendut dengan rambut khas Indonesia ikut nimbrung, langsung membuka sketchbook-nya. \"Gue lagi gambar scene Minecraft, mau liat?\"",
            focusChar: "ardi"
        },
        {
            text: "Hanif menunjukkan sketsa pemain Minecraft dengan diamond armor. \"Keren kan? Ini karakter gue main sama kalian nanti.\"\n\nKenan ngeliatin sambil ngunyah kerupuk. \"Gambar lo makin rapi, Han.\"\n\nLangit cuma melirik sekilas. \"Game doang.\" ucapnya cuek.\n\nTapi matanya sesekali menatap Ardi yang sedang tersenyum kecil melihat sketsa itu. Langit punya prinsip tegas soal laki-laki. Tapi kenapa hari ini dia merasa... aneh?",
            focusChar: "hanif"
        },
        {
            text: "Kenan mengajak Ardi main game bareng di rumahnya setelah sekolah. Di kamar yang berantakan, mereka asyik bermain.\n\n\"Lu nge-build rumah lucu amat, Di.\" kata Kenan.\n\n\"Aku suka yang estetik,\" jawab Ardi pelan.\n\nKenan tertawa. \"Ya elah, gak papa. Yang penting lu seneng.\"\n\nArdi menatap Kenan. Cowok gendut, polos, suka makan ini punya hati yang hangat. Jantung Ardi berdegup lebih kencang.\n\nTapi dia langsung memalingkan muka.\n\n\"Apa aku pantas untuknya?\" pikir Ardi.",
            focusChar: "kenan"
        },
        {
            text: "Langit pulang bersama Ardi. Di jalan sepi, mereka berdua.\n\n\"Lo kenalan sama Kenan dari kapan?\" tiba-tiba Langit bertanya.\n\n\"Dari SMP. Kenan selalu baik sama aku.\"\n\nLangit menghela napas. \"Jangan terlalu dekat sama dia. Aku lihat cara lo ngeliatin dia beda.\"\n\nArdi terdiam.\n\n\"Aku gak suka laki-laki suka laki-laki,\" kata Langit tegas. \"Itu gak wajar.\"\n\nArdi menunduk, menahan sesak di dadanya.",
            focusChar: "langit"
        },
        {
            text: "Malam itu Ardi nangis di kamar. Kata-kata Langit menusuk. Tapi bukan hanya karena sakit — karena ada sebagian kecil dari dirinya yang setuju.\n\n\"Mungkin aku memang aneh. Mungkin aku memang gak pantas.\"\n\nDia memandang cermin. Rambut pinknya, gesturnya yang lembut — semuanya terasa salah.\n\nArdi mulai menilai dirinya sendiri. Apakah dia cukup jantan? Apakah dia cukup normal? Apakah dia layak dicintai?",
            focusChar: "ardi"
        },
        {
            text: "Keesokan harinya, Hanif mengajak Ardi ke rooftop. \"Lo kenapa, Di? Kelihatan lesu.\"\n\nArdi bercerita tentang perasaannya ke Kenan dan omongan Langit.\n\nHanif diam lama. \"Lo tau gue suka gambar. Dan gue pernah gambar orang yang gue suka diam-diam.\"\n\n\"Siapa?\"\n\nHanif tersenyum pahit. \"Gak penting. Yang penting gue sadar, perasaan itu gak selalu harus diungkapin. Kadang kita simpan aja, biar persahabatan tetep utuh.\"\n\n\"Tapi sakit,\" bisik Ardi.\n\n\"Iya. Tapi kita bisa belajar dari rasa sakit itu.\"",
            focusChar: "hanif"
        },
        {
            text: "Kenan sadar Ardi jadi pendiam. Suatu sore, dia mengajak Ardi jajan bakso.\n\n\"Lu kenapa, Di? Jujur aja.\"\n\nArdi hampir mengaku. Tapi mulutnya terkatup rapat.\n\n\"Aku cuma... lagi mikirin sesuatu, Ken.\"\n\nKenan mengangguk. \"Ya udah, kalo lo mau cerita, gue siap dengerin. Tapi kalo belum siap, gapapa.\"\n\nKenan menggenggam tangan Ardi sebentar.\n\n\"Gue sahabat lo, apapun yang terjadi.\"\n\nDan itu cukup membuat Ardi merasa hangat — meski hatinya tetap perih.",
            focusChar: "kenan"
        },
        {
            text: "Langit duduk sendirian di perpustakaan. Dia mengamati Ardi dari kejauhan, yang sedang membaca buku sambil tersenyum kecil.\n\nLangit mengusap kepalanya sendiri. \"Kenapa sih gua jadi kepikiran dia?\" gumamnya.\n\nPrinsip anti gay yang dia bangun sejak kecil mulai goyah. Bukan karena dia berubah — tapi karena dia sadar bahwa perasaan itu tidak selalu bisa dikontrol.\n\nTapi dia tetap memilih diam. Dan menjauh.",
            focusChar: "langit"
        },
        {
            text: "Waktu berlalu. Ardi tetap berteman dengan Kenan, Langit, dan Hanif.\n\nTapi omongan Langit tertanam dalam-dalam. Ardi mulai menutupi dirinya. Rambut pinknya dicat hitam. Gerakannya dibuat lebih kasar.\n\nKenan heran. \"Lu kenapa jadi beda, Di?\"\n\n\"Aku pengen normal,\" jawab Ardi.\n\nTapi semakin dia memaksa, semakin dia hancur dalam diam.",
            focusChar: "ardi"
        },
        {
            text: "Hanif memergoki Ardi menangis di belakang sekolah.\n\n\"Lo kaya gini karena takut gak diterima?\" tanya Hanif.\n\nArdi mengangguk.\n\nHanif duduk di sampingnya. \"Gue juga pernah ngerasa gitu. Gue gendut, gak keren, gambar-gambar Minecraft doang. Tapi gue sadar, yang bisa nerima diri gue pertama kali ya gue sendiri.\"\n\n\"Tapi Langit bilang aku aneh...\"\n\n\"Langit itu juga masih belajar. Manusia itu rumit, Di. Termasuk lo.\"\n\nHanif memegang pundak Ardi. \"Jangan berubah cuma karena takut.\"",
            focusChar: "hanif"
        },
        {
            text: "🌧️ Suatu hujan, Langit menemui Ardi.\n\n\"Gue minta maaf,\" kata Langit pelan. \"Omongan gue tempo hari menyakitkan.\"\n\nArdi diam.\n\n\"Gue masih punya prinsip yang sama. Tapi gue sadar, gue gak punya hak buat judge perasaan orang lain.\"\n\n\"Terus kenapa kamu bilang begitu?\"\n\n\"Karena...\" Langit menunduk. \"Karena gue bingung sama perasaan gue sendiri. Dan rasa bingung itu bikin gue jahat.\"\n\nArdi menatap Langit lama.\n\n\"Maafin gue, Di,\" pinta Langit.\n\n\"Maaf,\" jawab Ardi lirih. Tapi luka itu butuh waktu.",
            focusChar: "langit"
        },
        {
            text: "🌸 Epilog.\n\nArdi memutuskan untuk tidak mengungkapkan perasaannya ke Kenan. Bukan karena takut — tapi karena dia sadar bahwa Kenan hanya melihatnya sebagai sahabat.\n\nDan itu tidak apa-apa.\n\nArdi mulai menerima dirinya perlahan. Rambut pinknya tumbuh kembali. Dia tetap lembut, tetap femboy, tetap dirinya.\n\nKenan masih teman main game-nya. Hanif masih setia menggambar. Dan Langit... Langit belajar untuk lebih terbuka.\n\nArdi tidak punya pacar. Dan mungkin untuk saat ini, itu yang terbaik.\n\nKarena dia belajar bahwa mencintai seseorang tidak harus memiliki. Dan yang terpenting, dia belajar untuk mencintai dirinya sendiri terlebih dahulu.\n\n✨ TAMAT ✨\n\n\"Aku cukup. Aku utuh. Aku sendiri, tapi tidak sendiri.\" — Ardi",
            focusChar: "ardi"
        }
    ];

    // ======================== STATE ========================
    let currentIndex = 0;
    const totalChapters = chapters.length;

    const storyTextDiv = document.getElementById('storyText');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const progressFill = document.getElementById('progressFill');
    const progressPercentSpan = document.getElementById('progressPercent');
    const charTags = document.querySelectorAll('.char-tag');

    function highlightChar(charName) {
        charTags.forEach(tag => {
            const tagChar = tag.innerText.toLowerCase().includes(charName.toLowerCase()) ? charName.toLowerCase() : null;
            if (tagChar === charName.toLowerCase()) {
                tag.classList.add('active');
            } else {
                tag.classList.remove('active');
            }
        });
    }

    function updateProgress() {
        const percent = ((currentIndex + 1) / totalChapters) * 100;
        progressFill.style.width = `${percent}%`;
        progressPercentSpan.innerText = `${Math.round(percent)}%`;
    }

    function renderCurrentChapter() {
        const chapter = chapters[currentIndex];
        if (!chapter) return;
        
        storyTextDiv.style.opacity = '0';
        setTimeout(() => {
            let formattedText = chapter.text.replace(/\n/g, '<br>');
            storyTextDiv.innerHTML = `<span class="quote">“</span><br>${formattedText}<br><span class="quote">”</span>`;
            storyTextDiv.style.opacity = '1';
            storyTextDiv.classList.remove('slide-up');
            void storyTextDiv.offsetWidth;
            storyTextDiv.classList.add('slide-up');
        }, 130);
        
        if (chapter.focusChar) highlightChar(chapter.focusChar);
        else highlightChar('ardi');
        
        updateProgress();
        
        if (currentIndex === totalChapters - 1) {
            nextBtn.innerText = '🏁 TELAH BERAKHIR 🏁';
            nextBtn.style.opacity = '0.8';
        } else {
            nextBtn.innerText = '➡ LANJUTKAN CERITA ⬅';
            nextBtn.style.opacity = '1';
        }
    }

    function nextChapter() {
        if (currentIndex < totalChapters - 1) {
            currentIndex++;
            renderCurrentChapter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            alert('🌸 Cerita telah selesai. Tekan "Mulai Awal" untuk membaca lagi. 🌸');
        }
    }

    function resetStory() {
        currentIndex = 0;
        renderCurrentChapter();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    nextBtn.addEventListener('click', nextChapter);
    resetBtn.addEventListener('click', resetStory);

    renderCurrentChapter();
</script>
</body>
</html>
